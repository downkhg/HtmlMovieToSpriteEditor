모델: gemini
에이전트: Antigravity
마지막수정사항: 경로 및 파일 설명 정정, 프로젝트/캐릭터 리드미 분리 및 자동화 스킬 추가

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.5 Flash Live Test Bench (generateContent v2)</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #242424;
            --border-color: #383838;
            --text-color: #dcdcdc;
            --accent-color: #0e639c;
            --accent-hover: #1177bb;
            --success: #4ec9b0;
            --error: #f48771;
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        h2 {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            color: #ffffff;
            margin-top: 0;
        }

        .info-badge {
            background-color: #1e293b;
            border-left: 4px solid #38bdf8;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #cbd5e1;
            border-radius: 0 4px 4px 0;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #888;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: 1px solid var(--accent-hover);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .status-bar {
            margin-top: 20px;
            padding: 12px;
            background-color: var(--panel-bg);
            border-left: 4px solid #666;
            font-weight: bold;
        }

        .status-bar.success { border-left-color: var(--success); color: var(--success); }
        .status-bar.error { border-left-color: var(--error); color: var(--error); }

        .output-box {
            margin-top: 15px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            min-height: 250px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 600px;
            overflow-y: auto;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gemini 3.5 Flash Live Test Bench (v2.1)</h2>
    
    <div class="info-badge">
        <strong>💡 브라우저 통신 최적화 패치:</strong> 구글 보안 정책 우회를 위해 <code>generateContent</code> 엔드포인트를 사용하며, API 키를 URL 쿼리 스트링으로 전달합니다. 3.5 스펙인 <code>thinking_level</code> 제어는 그대로 유지됩니다.
    </div>

    <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="text" id="apiKey" placeholder="AIzaSy...로 시작하는 키를 입력하세요" value="">
    </div>

    <div class="row">
        <div class="form-group">
            <label for="modelName">Model ID</label>
            <input type="text" id="modelName" value="gemini-3.5-flash" placeholder="gemini-3.5-flash">
        </div>
        <div class="form-group">
            <label for="thinkingLevel">Thinking Level (추론 수준)</label>
            <select id="thinkingLevel">
                <option value="medium" selected>medium (기본값 - 권장)</option>
                <option value="minimal">minimal (채팅/단순 팩트/가장 빠름)</option>
                <option value="low">low (지연 시간 최적화 코드/에이전트 작업)</option>
                <option value="high">high (복잡한 추론/수학/심층 코딩)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="apiVersion">API Version</label>
            <input type="text" id="apiVersion" value="v1beta" placeholder="v1beta">
        </div>
        <div class="form-group">
            <label for="modality">Modality (출력 형식)</label>
            <select id="modality">
                <option value="text" selected>Text Only (일반 텍스트 답변)</option>
                <option value="image">Text + Image (이미지 생성 테스트)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="promptText">Input Content (Prompt)</label>
        <textarea id="promptText" placeholder="질문을 입력하세요...">Explain how parallel agentic execution works in three sentences.</textarea>
    </div>

    <button id="sendBtn">EXECUTE LIVE REQUEST</button>

    <div class="status-bar" id="statusBar">Status: Idle</div>
    
    <label style="display:block; margin-top:20px; font-size:0.85rem; color:#888;">Console Response Streams</label>
    <div class="output-box" id="outputConsole">// API 실시간 응답 패킷이 마운트되는 영역입니다.</div>
</div>

<script>
document.getElementById('sendBtn').addEventListener('click', async () => {
    const apiKey = document.getElementById('apiKey').value.trim();
    const modelName = document.getElementById('modelName').value.trim();
    const thinkingLevel = document.getElementById('thinkingLevel').value;
    const apiVersion = document.getElementById('apiVersion').value.trim();
    const promptText = document.getElementById('promptText').value;
    const modality = document.getElementById('modality').value;
    
    const statusBar = document.getElementById('statusBar');
    const outputConsole = document.getElementById('outputConsole');

    if (!apiKey) {
        statusBar.className = 'status-bar error';
        statusBar.innerText = 'Status: Validation Failed';
        outputConsole.innerText = '[ERROR] 상단 폼에 Gemini API Key를 입력해야 테스트가 가능합니다.';
        return;
    }

    statusBar.className = 'status-bar';
    statusBar.innerText = 'Sending Request...';
    outputConsole.innerText = '구글 API 엔드포인트와 통신 중...';

    const isImagen = modelName.startsWith('imagen-');
    const url = isImagen 
        ? `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:predict?key=${apiKey}`
        : `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:generateContent?key=${apiKey}`;

    const payload = isImagen ? {
        instances: [
            {
                prompt: promptText
            }
        ],
        parameters: {
            sampleCount: 1,
            outputMimeType: "image/png",
            aspectRatio: "1:1"
        }
    } : {
        contents: [{
            parts: [{ text: promptText }]
        }],
        generationConfig: {}
    };

    if (!isImagen && modality === 'image') {
        payload.generationConfig.responseModalities = ["TEXT", "IMAGE"];
    }

    if (!isImagen && !modelName.includes('-image') && thinkingLevel) {
        payload.generationConfig.thinking_config = {
            thinking_level: thinkingLevel
        };
    }

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        statusBar.innerText = `Status: ${response.status} ${response.statusText}`;

        if (response.ok) {
            statusBar.classList.add('success');
            const data = await response.json();
            
            try {
                let outputHtml = '';
                let hasImage = false;

                if (isImagen) {
                    const base64 = data.predictions?.[0]?.bytesBase64Encoded;
                    if (base64) {
                        hasImage = true;
                        outputHtml += `[생성된 이미지 감지됨 (Imagen Predict)]\n`;
                        outputHtml += `<div style="margin: 15px 0; background: #000; padding: 10px; border-radius: 4px; display: inline-block;"><img src="data:image/png;base64,${base64}" style="max-width: 100%; max-height: 400px; display: block;" /></div>\n`;
                        outputHtml += `<a href="data:image/png;base64,${base64}" download="generated_test_image.png" style="display: inline-block; padding: 8px 16px; background: var(--success); color: #000; text-decoration: none; font-weight: bold; border-radius: 4px; font-family: sans-serif; font-size: 13px;">💾 이미지 다운로드</a>\n\n`;
                    } else {
                        outputHtml += `[경고] 이미지 바이트가 반환되지 않았습니다.\n\n`;
                    }
                } else {
                    const candidate = data.candidates?.[0];
                    const imagePart = candidate?.content?.parts?.find(p => p.inlineData);
                    const textPart = candidate?.content?.parts?.find(p => p.text);
                    
                    if (textPart) {
                        outputHtml += `[Gemini 응답 텍스트]\n${textPart.text}\n\n`;
                    }
                    
                    if (imagePart && imagePart.inlineData && imagePart.inlineData.data) {
                        hasImage = true;
                        const base64 = imagePart.inlineData.data;
                        const mime = imagePart.inlineData.mimeType || 'image/png';
                        outputHtml += `[생성된 이미지 감지됨]\n`;
                        outputHtml += `<div style="margin: 15px 0; background: #000; padding: 10px; border-radius: 4px; display: inline-block;"><img src="data:${mime};base64,${base64}" style="max-width: 100%; max-height: 400px; display: block;" /></div>\n`;
                        outputHtml += `<a href="data:${mime};base64,${base64}" download="generated_test_image.png" style="display: inline-block; padding: 8px 16px; background: var(--success); color: #000; text-decoration: none; font-weight: bold; border-radius: 4px; font-family: sans-serif; font-size: 13px;">💾 이미지 다운로드</a>\n\n`;
                    }
                }
                
                outputHtml += `=========================================\n[RAW RESPONSE JSON]\n${JSON.stringify(data, null, 4)}`;
                
                if (hasImage) {
                    outputConsole.innerHTML = outputHtml.replace(/\n/g, '<br>');
                } else {
                    outputConsole.innerText = outputHtml;
                }
            } catch (err) {
                outputConsole.innerText = `[파싱 안내] 응답 수신에는 성공했으나 구조가 예상과 다릅니다. 원본 JSON 데이터를 검토하세요.\n\n${JSON.stringify(data, null, 4)}`;
            }
        } else {
            statusBar.classList.add('error');
            const errorText = await response.text();
            outputConsole.innerText = `[API 서버 에러 응답]\n${errorText}`;
        }

    } catch (error) {
        statusBar.className = 'status-bar error';
        statusBar.innerText = 'Status: Exception Occurred';
        outputConsole.innerText = `[네트워크 통신 에러 로그]\n${error.stack || error}\n\n*우회 가이드: 일부 로컬망 환경이나 브라우저 정책에 따라 구글 서버가 CORS를 전면 차단할 수 있습니다. 에러가 계속된다면 Chrome 확장 프로그램(Allow CORS 등)을 활성화한 상태로 시도해 보시는 것이 가장 확실합니다.`;
    }
});

// Auto-switch model ID and prompt text on Modality change
document.getElementById('modality').addEventListener('change', (e) => {
    const val = e.target.value;
    const modelInput = document.getElementById('modelName');
    const promptArea = document.getElementById('promptText');
    
    if (val === 'image') {
        modelInput.value = 'gemini-2.5-flash-image';
        promptArea.value = 'A 2D pixel art character, chibi anime style, cute warrior, standing breathing pose, green background.';
    } else {
        modelInput.value = 'gemini-3.5-flash';
        promptArea.value = 'Explain how parallel agentic execution works in three sentences.';
    }
});
</script>
</body>
</html>
